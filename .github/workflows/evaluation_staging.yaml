name: CI/CD for Evaluation Service - Staging

on:
  workflow_dispatch:
  workflow_call:

  push:
    branches:
      - main
    paths:
      - 'Staging/**'
      - '.github/workflows/evaluation_staging.yaml'

  pull_request:
    branches:
      - main
    paths:
      - 'Staging/**'
      - '.github/workflows/evaluation_staging.yaml'

env:
  SERVICE_NAME: evaluation-service
  ENVIRONMENT: staging
  WORKDIR: Staging
  GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

jobs:
  build-test-security:
    name: Build + Tests
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: Staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: Togglemaster/Evaluation-Service

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Staging/go.mod

      # -----------------------------
      # 1. BUILD & UNIT TEST
      # -----------------------------
      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run Unit Tests
        run: go test -v ./...

      # -----------------------------
      # 2. LINTER
      # -----------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: Staging

      # -----------------------------
      # 3. SCA - Dependency Scan
      # -----------------------------
      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: Staging
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 4. SAST - Code Scan
      # -----------------------------
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./Staging/...

# ============================================================
#                     DOCKER SECTION
# ============================================================

  docker:
    name: Docker Build + Container Scan
    runs-on: ubuntu-latest
    environment: Staging
    needs: build-test-security
    defaults:
      run:
        working-directory: Staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: Togglemaster/Evaluation-Service

      # -----------------------------
      # 5. Docker Build
      # -----------------------------
      - name: Build Docker Image
        run: |
          IMAGE_NAME=$SERVICE_NAME:$ENVIRONMENT-${GITHUB_SHA}
          docker build -t $IMAGE_NAME .
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -----------------------------
      # 6. Container Scan (Trivy)
      # -----------------------------
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 7. Configure AWS Credentials
      # -----------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # 8. Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------
      # 9. Tag and Push Docker Image
      # -----------------------------
      - name: Tag and Push Image to ECR
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}

          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY=$SERVICE_NAME

          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION \
          || aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION

          docker tag $IMAGE_NAME $ECR_REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-$COMMIT_HASH
          docker tag $IMAGE_NAME $ECR_REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-$COMMIT_HASH
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-latest

  gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    environment: Staging
    needs: docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Togglemaster/Evaluation-Service
          fetch-depth: 0
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}
          FILE_PATH="${{ env.WORKDIR }}/Helm/${{ env.SERVICE_NAME }}/values.yaml"
          NEW_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:${{ env.ENVIRONMENT }}-$COMMIT_HASH"

          echo "Updating $FILE_PATH to image: $NEW_IMAGE"

          yq -i ".\"${{ env.SERVICE_NAME }}\".image = \"$NEW_IMAGE\"" "$FILE_PATH"

          ACTUAL=$(yq ".\"${{ env.SERVICE_NAME }}\".image" "$FILE_PATH")
          if [ "$ACTUAL" != "$NEW_IMAGE" ]; then
            echo "::error::yq did not update image field. Got: $ACTUAL"
            exit 1
          fi

          echo "values.yaml updated:"
          cat "$FILE_PATH"

      - name: Commit and Push changes
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}
          FILE_PATH="${{ env.WORKDIR }}/Helm/${{ env.SERVICE_NAME }}/values.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FILE_PATH"

          if git diff --staged --quiet; then
            echo "values.yaml already at $COMMIT_HASH — nothing to commit (re-run of same SHA)."
            exit 0
          fi

          git commit -m "Update ${{ env.SERVICE_NAME }} image (${{ env.ENVIRONMENT }}) to $COMMIT_HASH [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
